<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffb700",
                        "background-light": "#f8f8f5",
                        "background-dark": "#231d0f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Smart Steps - Sign In</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top Navigation Area -->
<header class="flex items-center p-6 justify-between">
<button aria-label="Go back" class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center bg-primary/10 rounded-full hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined !text-3xl">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-extrabold leading-tight tracking-tight flex-1 text-center pr-12">Smart Steps</h2>
</header>
<main class="flex-1 flex flex-col px-6 pb-12">
<!-- Logo Section -->
<div class="flex flex-col items-center justify-center py-8 @container">
<div class="w-40 h-40 rounded-full flex items-center justify-center mb-6 overflow-hidden border-4 border-primary bg-white">
<img class="w-full h-full object-contain" data-alt="Smart Steps logo" src="../../assets/images/logo smartstep-01.png">
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-4xl font-extrabold leading-tight text-center">Welcome!</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium text-center mt-2">Let's get moving together</p>
</div>
<!-- Form Section -->
<div class="space-y-6 max-w-md mx-auto w-full">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-xl font-bold px-1">Email Address</label>
<div class="relative flex items-center group">
<div class="absolute left-4 text-primary group-focus-within:scale-110 transition-transform">
<span class="material-symbols-outlined !text-3xl">mail</span>
</div>
<input class="w-full h-16 pl-14 pr-4 rounded-xl border-2 border-primary/20 bg-white dark:bg-slate-800 text-xl focus:border-primary focus:ring-4 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400" placeholder="name@email.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-xl font-bold px-1">Password</label>
<div class="relative flex items-center group">
<div class="absolute left-4 text-primary group-focus-within:scale-110 transition-transform">
<span class="material-symbols-outlined !text-3xl">lock</span>
</div>
<input class="w-full h-16 pl-14 pr-14 rounded-xl border-2 border-primary/20 bg-white dark:bg-slate-800 text-xl focus:border-primary focus:ring-4 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400" placeholder="Your password" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined !text-3xl">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="text-right">
<a class="text-primary font-bold text-lg hover:underline underline-offset-4" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-slate-900 text-2xl font-extrabold h-20 rounded-xl shadow-lg shadow-primary/30 transition-all active:scale-95 flex items-center justify-center gap-3 mt-4">
                    Sign In
                    <span class="material-symbols-outlined !text-3xl">login</span>
</button>
<!-- Sign Up Link -->
<div class="text-center pt-6 pb-4">
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium">
                        New to Smart Steps? 
                        <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Create Account</a>
</p>
</div>
</div>
<!-- Accessibility Footer -->
</main>
</div>
</body></html>
